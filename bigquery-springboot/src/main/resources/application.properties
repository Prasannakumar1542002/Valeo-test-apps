# ─────────────────────────────────────────────────────────────────
# Server
# ─────────────────────────────────────────────────────────────────
server.port=8080

# ─────────────────────────────────────────────────────────────────
# Google BigQuery — set these values before running
# ─────────────────────────────────────────────────────────────────
bigquery.project-id=valeo-cp2129
bigquery.dataset-id=PRD
bigquery.table-id=Executed_Shipment_View

# Max rows returned by the default table fetch (safety cap)
bigquery.max-rows=100

# Optional: absolute path to a service-account JSON key file.
# Leave blank to use Application Default Credentials (ADC).
# ADC works automatically on GCE / GKE / Cloud Run, or locally after:
#   gcloud auth application-default login
bigquery.service-account-key-path=

# ─────────────────────────────────────────────────────────────────
# Thymeleaf
# ─────────────────────────────────────────────────────────────────
spring.thymeleaf.cache=false

# ─────────────────────────────────────────────────────────────────
# Logging
# ─────────────────────────────────────────────────────────────────
logging.level.com.poc.bigquery=INFO
